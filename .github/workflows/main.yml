name: Build TWRP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y git repo python-is-python3 openjdk-8-jdk bc bison build-essential curl flex g++-multilib gcc-multilib gnupg gperf imagemagick lib32ncurses5-dev lib32readline-dev lib32z1-dev liblz4-tool libncurses5 libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev

    - name: Init repo
      run: |
        repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_omni.git -b twrp-6.0

    - name: Sync repo
      run: |
        repo sync -j$(nproc)

    - name: Clone device tree
      run: |
        git clone https://github.com/zqano/TWRP_device_oppo_a33 device/oppo/a33

    - name: Build TWRP
      run: |
        source build/envsetup.sh
        lunch omni_a33-eng
        mka recoveryimage

    - name: Upload Recovery
      uses: actions/upload-artifact@v3
      with:
        name: TWRP-a33
        path: out/target/product/a33/recovery.img
